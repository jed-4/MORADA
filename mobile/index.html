<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BuildPro" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/mobile-manifest.json" />
    <link rel="apple-touch-icon" href="/mobile-icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>BuildPro Mobile</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        try {
          // Mirrors client/index.html: honour ?theme=dark|light URL override
          // (does not persist), then localStorage, then OS preference.
          var qsTheme = null;
          try {
            var qs = new URLSearchParams(window.location.search).get('theme');
            if (qs === 'dark' || qs === 'light') qsTheme = qs;
          } catch(_) {}
          var stored = null;
          try { stored = localStorage.getItem('theme'); } catch(_) {}
          var resolved = qsTheme === 'dark' ? 'dark'
            : qsTheme === 'light' ? 'light'
            : stored === 'dark' ? 'dark'
            : stored === 'light' ? 'light'
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(resolved);
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
