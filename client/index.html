<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Morada - Project Management for Residential Builders</title>
    <meta name="description" content="Professional project management software designed specifically for Australian residential builders. Manage projects, tasks, schedules, and teams efficiently." />
    <meta property="og:title" content="Morada - Project Management for Residential Builders" />
    <meta property="og:description" content="Streamline your residential building projects with our comprehensive project management platform." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        function paint(label, err) {
          try {
            var root = document.getElementById('root');
            if (!root) return;
            if (root.getAttribute('data-bp-error') === '1') return;
            root.setAttribute('data-bp-error', '1');
            var msg = (err && (err.message || err.reason || String(err))) || 'unknown';
            var stack = (err && err.stack) ? String(err.stack) : '';
            var src = (err && err.filename) ? (err.filename + ':' + (err.lineno||'?') + ':' + (err.colno||'?')) : '';
            root.innerHTML =
              '<div style="font-family:ui-sans-serif,system-ui,sans-serif;padding:24px;max-width:760px;margin:40px auto;color:#111">' +
              '<h1 style="font-size:20px;font-weight:600;margin:0 0 8px">Morada failed to load</h1>' +
              '<div style="color:#6b7280;font-size:13px;margin-bottom:12px">' + label + '</div>' +
              '<pre style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:12px;font-size:12px;white-space:pre-wrap;word-break:break-word;color:#991b1b">' +
                (msg).replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}) +
                (src ? '\n\nat ' + src : '') +
                (stack ? '\n\n' + stack.replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}) : '') +
              '</pre>' +
              '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;font-size:14px;border-radius:6px;border:1px solid #d1d5db;background:white;cursor:pointer">Reload page</button>' +
              '</div>';
          } catch(_){}
        }
        function report(label, info) {
          try {
            fetch('/api/_client-error', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ label: label, info: info, ua: navigator.userAgent, url: location.href })
            }).catch(function(){});
          } catch(_){}
        }
        window.addEventListener('error', function(ev) {
          // Ignore resource load errors (img/link/script/etc failed to load).
          // Those fire on the element itself, not on window, and have no useful message.
          if (ev.target && ev.target !== window && ev.target.tagName) {
            try {
              var tag = ev.target.tagName;
              var src = ev.target.src || ev.target.href || '';
              report('resource-load-error', { tag: tag, src: src });
            } catch(_){}
            return;
          }
          var err = ev.error || ev;
          var msg = err && (err.message || err.reason);
          // If we have no message and no stack, it's not actionable — don't paint over the app.
          if (!msg && !(err && err.stack)) {
            report('window-error-no-message', { type: ev.type, filename: ev.filename, lineno: ev.lineno });
            return;
          }
          report('uncaught-error', { message: String(msg), stack: String((err&&err.stack)||''), filename: ev.filename, lineno: ev.lineno });
          paint('Uncaught error during startup', err);
        }, true);
        window.addEventListener('unhandledrejection', function(ev) {
          var r = ev.reason;
          var msg = r && (r.message || r);
          report('unhandled-rejection', { message: String(msg), stack: String((r&&r.stack)||'') });
          if (msg) paint('Unhandled promise rejection during startup', r);
        });
        try {
          // Optional URL override (?theme=dark|light) — does not persist, used
          // for design / palette previews without changing the saved choice.
          var qsTheme = null;
          try {
            var qs = new URLSearchParams(window.location.search).get('theme');
            if (qs === 'dark' || qs === 'light') qsTheme = qs;
          } catch(_) {}
          var theme = qsTheme || localStorage.getItem('theme');
          var resolvedTheme = theme === 'dark' ? 'dark'
            : theme === 'light' ? 'light'
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(resolvedTheme);
          var variant = localStorage.getItem('dark-warm-variant');
          var allVariantClasses = ['dark-warm-a','dark-warm-b','dark-warm-c','dark-warm-d','dark-warm-e','dark-warm-f','dark-warm-g'];
          for (var i = 0; i < allVariantClasses.length; i++) root.classList.remove(allVariantClasses[i]);
          // Variants a-f have been removed from CSS (dark mode is locked to #1C1B19).
          // Only the light-mode variant 'g' is honoured here, and only when the
          // resolved theme is light — matching ThemeContext.applyWarmVariantClass.
          if (variant === 'g' && resolvedTheme === 'light') {
            root.classList.add('dark-warm-g');
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
